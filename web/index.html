<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>武侠剧场 · 多 Agent 即兴演出</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%97%A1%EF%B8%8F%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app">
      <!-- 左：角色对话（聊天式） -->
      <section class="pane drama-pane">
        <header class="pane-head">
          <div class="brand">
            <span class="seal">武侠剧场</span>
            <span class="brand-sub">多 Agent 即兴 · 群侠对话</span>
          </div>
          <div id="status" class="status" hidden>
            <span class="status-dot"></span>
            <span class="status-text"></span>
          </div>
        </header>

        <div id="chat" class="chat">
          <div id="empty" class="empty">
            <p class="empty-title">写一句开场，群侠登台</p>
            <p class="empty-sub">导演会即兴生成人物与背景，角色们随后你一言我一语地演下去。</p>
            <div class="samples">
              <button class="chip" type="button">月黑风高，镖车行至断魂崖，忽闻马嘶。</button>
              <button class="chip" type="button">江南茶楼，说书人一拍醒木，堂下坐着三名蒙面客。</button>
              <button class="chip" type="button">紫禁之巅，两位绝顶高手隔剑相望，风雪不落。</button>
            </div>
          </div>
        </div>

        <form id="composer" class="composer" autocomplete="off">
          <textarea
            id="seed"
            rows="1"
            placeholder="写下一句开场引子，回车开演……"
          ></textarea>
          <button id="play" class="send-btn" type="submit" title="开演（Enter）">
            <span>开演</span>
          </button>
        </form>
      </section>

      <!-- 右：执笔成文 -->
      <section class="pane novel-pane">
        <header class="pane-head">
          <div class="brand">
            <span class="seal seal-gold">执笔成文</span>
            <span class="brand-sub">单 Agent 全局视角 · 改写成小说体</span>
          </div>
          <button id="write" class="write-btn" type="button" disabled>
            执笔成文
          </button>
        </header>

        <div id="novel" class="novel">
          <div id="novel-empty" class="empty">
            <p class="empty-title">此处留白，静待成文</p>
            <p class="empty-sub">
              左侧演完一幕后，点右上角「执笔成文」——执笔人会用全局视角把整幕即兴记录改写成一章小说正文。
            </p>
          </div>
        </div>
      </section>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
