<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>武侠剧场 · 多章小说</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%9C%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="novel-app">
      <!-- 左：书斋 / 大纲 -->
      <aside class="pane outline-pane">
        <header class="pane-head">
          <div class="brand">
            <span class="seal">书斋</span>
            <span class="brand-sub">立意 · 大纲 · 续写</span>
          </div>
          <a class="text-link" href="/" title="切换到单幕即兴">单幕 →</a>
        </header>

        <div class="outline-scroll">
          <div class="project-bar">
            <select id="project-select" title="已有小说">
              <option value="">— 选择已有小说 —</option>
            </select>
          </div>

          <form id="create-form" class="create-form" autocomplete="off">
            <textarea id="seed" rows="2" placeholder="写一句前提，开一部新书……"></textarea>
            <button id="create-btn" class="write-btn" type="submit">立意开书</button>
          </form>

          <div class="samples" id="samples">
            <button class="chip" type="button">少年背负灭门血仇，下山寻仇，却卷入一桩夺谱惊局。</button>
            <button class="chip" type="button">女捕头查一桩连环命案，线索直指二十年前的江湖旧盟。</button>
          </div>

          <div id="outline" class="outline" hidden>
            <div class="outline-title" id="outline-title"></div>
            <p class="outline-logline" id="outline-logline"></p>
            <ol class="chapter-list" id="chapter-list"></ol>
          </div>
        </div>

        <div class="gen-bar" id="gen-bar" hidden>
          <label class="auto-toggle">
            <input type="checkbox" id="auto" /> 自动续写到完本
          </label>
          <button id="gen-next" class="send-btn" type="button">生成下一章</button>
        </div>
      </aside>

      <!-- 中：演武场 / 本章 -->
      <main class="pane stage-pane">
        <header class="pane-head">
          <div class="brand">
            <span class="seal seal-gold" id="stage-title">演武场</span>
            <span class="brand-sub" id="stage-sub">多 Agent 演一章 · 执笔人成文</span>
          </div>
          <div id="status" class="status" hidden>
            <span class="status-dot"></span>
            <span class="status-text"></span>
          </div>
        </header>
        <div id="stage" class="chat">
          <div id="stage-empty" class="empty">
            <p class="empty-title">开一部书，或选一部旧作</p>
            <p class="empty-sub">立意开书后，点左下角「生成下一章」——群侠登台演一章，执笔人随后成文，档案官记下前情。</p>
          </div>
        </div>
      </main>

      <!-- 右：记忆 / 档案 -->
      <aside class="pane memory-pane">
        <header class="pane-head">
          <div class="brand">
            <span class="seal seal-ink">档案</span>
            <span class="brand-sub">世界观 · 人物 · 伏笔</span>
          </div>
        </header>
        <div id="memory" class="memory">
          <div class="empty">
            <p class="empty-sub">故事梗概、未回收伏笔与人物档案会随每章更新，保证长篇不崩。</p>
          </div>
        </div>
      </aside>
    </div>

    <script src="/novel.js"></script>
  </body>
</html>
